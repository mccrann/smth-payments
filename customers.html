<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Demo Dashboard | Smth Payments</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=VT323&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles-demo.css" />
</head>
<body>
    <main>
        <div class="sidebar">
            <h1>SMTH <span>Payments</span></h1>
            <nav class="site-nav">
                <ul>
                    <li class="icon icon-dashboard"><a href="/dashboard.html" class="active">Dashboard</a></li>
                    <li class="icon icon-payments"><a href="/payments.html">Payments</a></li>
                    <li class="icon icon-customers"><a href="/customers.html">Customers</a></li>
                    <li class="icon icon-refunds"><a href="/refunds.html">Refunds</a></li>
                    <li class="icon icon-payouts"><a href="/payouts.html">Payouts</a></li>
                </ul>
            </nav>
            
        </div>
        <div class="all-content">
            <div class="top-bar">
                <p>Overview of your payment activity</p>
                <button id="reset-demo-data" type="button" class="button-primary">
                    Reset demo data
                </button>
                <button class="button-primary">+New Payment</button>            
            </div>
        <main class="main-content">
  <header class="page-header">
    <div>
      <h1>Customers</h1>
      <p>Manage the people who pay your business.</p>
    </div>

    <button id="open-customer-form" class="button button-primary" type="button">
      Add customer
    </button>
  </header>

  <section class="panel">
    <form id="customer-form" class="customer-form" hidden>
      <div>
        <label for="customer-name">Name</label>
        <input id="customer-name" name="name" required>
      </div>

      <div>
        <label for="customer-email">Email</label>
        <input id="customer-email" name="email" type="email" required>
      </div>

      <div class="form-actions">
        <button type="submit" class="button button-primary">
          Save customer
        </button>

        <button id="cancel-customer-form" type="button" class="button">
          Cancel
        </button>
      </div>
    </form>

    <div class="table-wrapper">
      <table class="payments-table">
        <thead>
          <tr>
            <th>Customer</th>
            <th>Status</th>
            <th>Created</th>
            <th></th>
          </tr>
        </thead>

        <tbody id="customers-body"></tbody>
      </table>
    </div>
  </section>
</main>


    <footer class="site-footer">
        <p>© 2026 Smth Payments. Smooth payment solutions.</p>
    </footer>
<script type="module" src="/js/customers.js"></script>
</body>
</html>
